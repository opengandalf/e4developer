baseURL = "https://e4developer.com/"
languageCode = "en-us"
title = "e4developer"
theme = "PaperMod"
paginate = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  author = "Bartosz Jedrzejewski"
  description = "Software engineering, microservices, Java, Spring Boot, AWS, DevOps, and tech leadership"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false
  comments = false
  customCSS = ["css/custom.css"]

  [params.homeInfoParams]
    Title = "e4developer"
    Content = "Software engineering blog by Bartosz Jedrzejewski — microservices, Java, Spring Boot, AWS, DevOps, and tech leadership."

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/e4developer"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/bjedrzejewski"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/bartoszjedrzejewski/"

  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
    style = "dracula"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 40

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 50
